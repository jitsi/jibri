<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Jibri Recorder</title>
		<style>
			body {
				margin: 0;
				background: #000;
			}
			#jitsiMeetContainer {
				width: 100%;
				height: 100vh;
			}
		</style>
	</head>
	<body>
		<div id="jitsiMeetContainer"></div>
		<script>

			// This page may be loaded from a local file (file://) instead of being
			// served by the deployment, so the deployment base url is passed in as a
			// query parameter and used to source external_api.js and to connect to.
			const params = new URLSearchParams(window.location.search);
			const room = params.get("room");
			const baseUrl = params.get("baseUrl");
			if (!room) {
				console.error("[recorder] Missing required 'room' parameter");
			} else if (!baseUrl) {
				console.error(
					"[recorder] Missing required 'baseUrl' parameter",
				);
			} else {
				const script = document.createElement("script");
				script.src = `${baseUrl.replace(/\/$/, "")}/external_api.js`;
				script.onload = () => {
					console.log("[recorder] external_api.js onload fired");
				};
				script.onerror = () =>
					console.error(
						`[recorder] Failed to load external_api.js from ${baseUrl}`,
					);
				document.head.appendChild(script);
			}

			function initializeRecorder(room, baseUrl) {
				const domain = new URL(baseUrl).host;

				console.log(
					`[recorder] Initializing for room=${room} domain=${domain}`,
				);

				try {
					const api = new JitsiMeetExternalAPI(domain, {
						roomName: room,
						parentNode: document.querySelector(
							"#jitsiMeetContainer",
						),
						configOverwrite: {
							iAmRecorder: true,
							disableInitialGUM: true,
							startWithAudioMuted: true,
							startWithVideoMuted: true,
							prejoinConfig: { enabled: false },
							p2p: { enabled: false },
						},
					});

					window.jibriRecorderApi = api;

					window.jibriPageState = {
						conferenceJoined: false,
						participantIds: new Set(),
						getRemoteParticipantCount() {
							return this.participantIds.size;
						},
					};



					api.addListener("participantJoined", (p) => {
						window.jibriPageState.participantIds.add(p.id);
					});

					api.addListener("participantLeft", (p) => {
						window.jibriPageState.participantIds.delete(p.id);
					});

					api.addListener("conferenceLeft", () => {
						window.jibriPageState.conferenceJoined = false;
						window.jibriPageState.participantIds.clear();
					});

				} catch (e) {
					window.jibriRecorderApi = null;
				}
			}
		</script>
	</body>
</html>
