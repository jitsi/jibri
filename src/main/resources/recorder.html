<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Jibri Recorder</title>
		<style>
			body {
				margin: 0;
				background: #000;
			}
			#jitsiMeetContainer {
				width: 100%;
				height: 100vh;
			}
		</style>
	</head>
	<body>
		<div id="jitsiMeetContainer"></div>
		<script>
			// This page may be loaded from a local file (file://) instead of being
			// served by the deployment, so the deployment base url is passed in as a
			// query parameter and used to source external_api.js and to connect to.
			const params = new URLSearchParams(window.location.search);
			const room = params.get("room");
			const baseUrl = params.get("baseUrl");
			const tenant = params.get("tenant");
			if (!room) {
				console.error("[recorder] Missing required 'room' parameter");
			} else if (!baseUrl) {
				console.error(
					"[recorder] Missing required 'baseUrl' parameter",
				);
			} else {
				const script = document.createElement("script");
				script.src = `${baseUrl.replace(/\/$/, "")}/external_api.js`;
				script.onload = () => {
					initializeRecorder(room, baseUrl, tenant);
				};
				script.onerror = () => {
					const errorMsg = `Failed to load external_api.js from ${baseUrl}`;
					window.jibriPageState = {
						apiError: errorMsg,
					};
				};
				document.head.appendChild(script);
			}

			function initializeRecorder(room, baseUrl, tenant) {
				const domain = new URL(baseUrl).host;
				// Construct roomName matching URL format: tenant and room separated by slashes
				const roomName = tenant ? `${tenant}/${room}` : room;

				console.log(
					`[recorder] Initializing for domain=${domain} roomName=${roomName}`,
				);

				try {
					const api = new JitsiMeetExternalAPI(domain, {
						roomName: roomName,
						parentNode: document.querySelector(
							"#jitsiMeetContainer",
						),
						configOverwrite: {
							iAmRecorder: true,
							disableInitialGUM: true,
							startWithAudioMuted: true,
							startWithVideoMuted: true,
							prejoinConfig: { enabled: false },
							p2p: { enabled: false },
						},
					});

					window.jibriRecorderApi = api;

					window.jibriPageState = {
						conferenceJoined: false,
						apiError: null,
					};

					api.addListener("videoConferenceJoined", () => {
						window.jibriPageState.conferenceJoined = true;
					});

					api.addListener("videoConferenceLeft", () => {
						window.jibriPageState.conferenceJoined = false;
					});

					api.addListener("errorOccurred", (error) => {
						const errorMsg = `${error.type}:${error.name} - ${error?.message}`;
						window.jibriPageState.apiError = errorMsg;
					});
				} catch (e) {
					window.jibriPageState = {
						apiError:
							e.message || "Failed to initialize External API",
					};
					window.jibriRecorderApi = null;
				}
			}
		</script>
	</body>
</html>
